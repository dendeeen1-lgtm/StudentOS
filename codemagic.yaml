workflows:
  android-release:
    name: StudentOS Android Release
    max_build_duration: 60
    environment:
      node: 20.14.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Write .env
        script: |
          echo "FIREBASE_API_KEY=$FIREBASE_API_KEY" >> .env
          echo "FIREBASE_AUTH_DOMAIN=$FIREBASE_AUTH_DOMAIN" >> .env
          echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> .env
          echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID" >> .env
          echo "FIREBASE_APP_ID=$FIREBASE_APP_ID" >> .env
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Generate keystore
        script: |
          keytool -genkeypair -v \
            -keystore $CM_BUILD_DIR/studentos.keystore \
            -alias studentos \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass studentos123 \
            -keypass studentos123 \
            -dname "CN=StudentOS, OU=App, O=StudentOS, L=Manila, S=NCR, C=PH"
      - name: Bundle JS
        script: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Build Release APK
        script: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/studentos.keystore \
            -Pandroid.injected.signing.store.password=studentos123 \
            -Pandroid.injected.signing.key.alias=studentos \
            -Pandroid.injected.signing.key.password=studentos123
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true

  ios-release:
    name: StudentOS iOS Release
    max_build_duration: 60
    environment:
      node: 20.14.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Write .env
        script: |
          echo "FIREBASE_API_KEY=$FIREBASE_API_KEY" >> .env
          echo "FIREBASE_AUTH_DOMAIN=$FIREBASE_AUTH_DOMAIN" >> .env
          echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> .env
          echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID" >> .env
          echo "FIREBASE_APP_ID=$FIREBASE_APP_ID" >> .env
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -workspace ios/studentos.xcworkspace \
            -scheme studentos \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p build/ipa
          cp -r build/Build/Products/Release-iphoneos/studentos.app build/ipa/
          cd build/ipa && zip -r StudentOS.ipa studentos.app
    artifacts:
      - build/ipa/StudentOS.ipa
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
