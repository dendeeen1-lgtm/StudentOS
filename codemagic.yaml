workflows:
  android-workflow:
    name: StudentOS Android
    max_build_duration: 60
    environment:
      node: 20.14.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Write .env
        script: |
          echo "FIREBASE_API_KEY=$FIREBASE_API_KEY" >> .env
          echo "FIREBASE_AUTH_DOMAIN=$FIREBASE_AUTH_DOMAIN" >> .env
          echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> .env
          echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID" >> .env
          echo "FIREBASE_APP_ID=$FIREBASE_APP_ID" >> .env
      - name: Write google-services.json to root
        script: |
          echo $GOOGLE_SERVICES_JSON | tr -d ' ' | base64 -d > $CM_BUILD_DIR/google-services.json
          cat $CM_BUILD_DIR/google-services.json
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
