workflows:
  studentos-release:
    name: StudentOS Release (Android + iOS)
    max_build_duration: 120
    environment:
      node: 20.14.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Write .env
        script: |
          echo "FIREBASE_API_KEY=$FIREBASE_API_KEY" >> .env
          echo "FIREBASE_AUTH_DOMAIN=$FIREBASE_AUTH_DOMAIN" >> .env
          echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> .env
          echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> .env
          echo "FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID" >> .env
          echo "FIREBASE_APP_ID=$FIREBASE_APP_ID" >> .env
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Generate keystore
        script: |
          keytool -genkeypair -v \
            -keystore $CM_BUILD_DIR/studentos.keystore \
            -alias studentos \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass studentos123 \
            -keypass studentos123 \
            -dname "CN=StudentOS, OU=App, O=StudentOS, L=Manila, S=NCR, C=PH"
      - name: Bundle JS for Android
        script: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/studentos.keystore \
            -Pandroid.injected.signing.store.password=studentos123 \
            -Pandroid.injected.signing.key.alias=studentos \
            -Pandroid.injected.signing.key.password=studentos123
      - name: Prebuild iOS
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS unsigned IPA
        script: |
          SCHEME=$(xcodebuild -list -workspace ios/studentos.xcworkspace | grep -A5 "Schemes" | grep -v "Schemes:" | head -1 | xargs)
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -workspace ios/studentos.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "--- Listing build products ---"
          find build/Build/Products -type d -name "*.app" 2>/dev/null
          echo "--- All files in Release-iphoneos ---"
          ls build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "Release-iphoneos not found"
          mkdir -p build/ipa
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -1)
          echo "App path found: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "App name: $APP_NAME"
          cp -r "$APP_PATH" build/ipa/
          cd build/ipa && zip -r StudentOS.ipa "$APP_NAME"
          echo "IPA created successfully"
    artifacts:
      - android/app/build/outputs/**/*.apk
      - build/ipa/StudentOS.ipa
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
