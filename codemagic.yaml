workflows:
  android-workflow:
    name: StudentOS Android
    max_build_duration: 60
    environment:
      node: 20.14.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Write google-services.json
        script: echo $GOOGLE_SERVICES_JSON | base64 --decode > $CM_BUILD_DIR/google-services.json
      - name: Prebuild Android
        script: npx expo prebuild --platform android --clean
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
